name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-scan:
    name: Build, Scan & Push Image
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx for optimization and caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build the Docker image locally to scan it before pushing
      - name: Build Local Image for Scanning
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true # Loads the image locally so it is accessible by Trivy
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laurus-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. Run Trivy Vulnerability Scan on the local image
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/laurus-backend:test'
          format: 'table'
          exit-code: '1' # Fails the pipeline pipeline if critical vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      # 5. Log in to Docker Hub (only executes on pushes to the main branch)
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Push the verified image to Docker Hub with tags
      - name: Build and Push Verified Image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/laurus-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/laurus-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
